<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontario Workforce Priority Stream EOI Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: auto;
            min-height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
            margin: 20px auto;
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                padding: 24px 16px 32px;
                margin: 0;
                box-shadow: none;
            }
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        
        .score-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            position: sticky;
            top: 0;
            z-index: 10;
            background: white;
            padding-top: 10px;
        }
        
        .score-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        
        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .score-number {
            font-size: 42px;
            font-weight: bold;
        }
        
        .score-subtext {
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.85;
        }

        @media (max-width: 480px) {
            .score-display {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-bottom: 24px;
                padding-top: 6px;
                padding-bottom: 6px;
            }

            .score-card {
                padding: 14px 10px;
            }

            .score-number {
                font-size: 30px;
            }

            .score-label {
                font-size: 10px;
            }

            .score-subtext {
                font-size: 11px;
                margin-top: 4px;
            }
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* Keep the sticky score cards side-by-side (not stacked) at every
           mobile width so the pinned header stays compact while scrolling. */
        @media (max-width: 768px) {
            .score-display {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group select {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .form-group select:hover {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }
        
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .points-indicator {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-top: 6px;
        }
        
        .reset-button {
            background: #f44336;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }
        
        .reset-button:hover {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        
        .status {
            margin-top: 30px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
        }
        
        .status-strong {
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ontario Workforce Priority Stream</h1>
            <p class="subtitle">EOI Scoring Calculator (2026)</p>
        </header>
        
        <div class="score-display">
            <div class="score-card">
                <div class="score-label">Your Score</div>
                <div class="score-number" id="totalScore">0</div>
                <div class="score-subtext">Points earned</div>
            </div>
            <div class="score-card">
                <div class="score-label">Maximum Score</div>
                <div class="score-number">130</div>
                <div class="score-subtext">Total available points</div>
            </div>
        </div>
        
        <form id="eoi-form">
            <div class="form-grid">
                <!-- 1. NOC TEER Category -->
                <div class="form-group">
                    <label for="teer">1. NOC TEER Category <span style="color: #999;">(max 9)</span></label>
                    <select id="teer" data-max="9">
                        <option value="0">Select...</option>
                        <option value="9">TEER 0 or 1 (9 points)</option>
                        <option value="6">TEER 2 or 3 (6 points)</option>
                        <option value="0">TEER 4 or 5 (0 points)</option>
                    </select>
                    <div class="points-indicator" id="teer-points"></div>
                </div>
                
                <!-- 2. NOC Occupational Category -->
                <div class="form-group">
                    <label for="occupation">2. NOC Occupational Category <span style="color: #999;">(max 10)</span></label>
                    <select id="occupation" data-max="10">
                        <option value="0">Select...</option>
                        <option value="10">Category 3 (10 points)</option>
                        <option value="8">Category 7 (8 points)</option>
                        <option value="6">Category 2 (6 points)</option>
                        <option value="4">Category 0,1,4,8,9 (4 points)</option>
                        <option value="2">Category 5,6 (2 points)</option>
                    </select>
                    <div class="points-indicator" id="occupation-points"></div>
                </div>
                
                <!-- 3. Hourly Wage -->
                <div class="form-group">
                    <label for="wage">3. Hourly Wage <span style="color: #999;">(max 15)</span></label>
                    <select id="wage" data-max="15">
                        <option value="0">Select...</option>
                        <option value="15">$40+ (15 points)</option>
                        <option value="12">$35 - $39.99 (12 points)</option>
                        <option value="10">$30 - $34.99 (10 points)</option>
                        <option value="8">$25 - $29.99 (8 points)</option>
                        <option value="6">$20 - $24.99 (6 points)</option>
                        <option value="0">Less than $20 (0 points)</option>
                    </select>
                    <div class="points-indicator" id="wage-points"></div>
                </div>
                
                <!-- 4. Ontario Work Experience -->
                <div class="form-group">
                    <label for="experience">4. Ontario Work Experience <span style="color: #999;">(max 18)</span></label>
                    <select id="experience" data-max="18">
                        <option value="0">Select...</option>
                        <option value="18">More than 24 months (18 points)</option>
                        <option value="15">13 - 24 months (15 points)</option>
                        <option value="12">6 - 12 months (12 points)</option>
                        <option value="0">Less than 6 months (0 points)</option>
                    </select>
                    <div class="points-indicator" id="experience-points"></div>
                </div>
                
                <!-- 5. Canadian Earnings History -->
                <div class="form-group">
                    <label for="earnings">5. Canadian Earnings History <span style="color: #999;">(max 8)</span></label>
                    <select id="earnings" data-max="8">
                        <option value="0">Select...</option>
                        <option value="8">$70,000+ (8 points)</option>
                        <option value="6">$50k - $69,999 (6 points)</option>
                        <option value="4">$30k - $49,999 (4 points)</option>
                        <option value="0">Less than $30k (0 points)</option>
                    </select>
                    <div class="points-indicator" id="earnings-points"></div>
                </div>
                
                <!-- 6. Legal Status -->
                <div class="form-group">
                    <label for="status">6. Legal Status in Canada <span style="color: #999;">(max 10)</span></label>
                    <select id="status" data-max="10">
                        <option value="0">Select...</option>
                        <option value="10">Valid work permit (10 points)</option>
                        <option value="5">Valid study permit (5 points)</option>
                        <option value="0">No valid permit (0 points)</option>
                    </select>
                    <div class="points-indicator" id="status-points"></div>
                </div>
                
                <!-- 7. Education Level -->
                <div class="form-group">
                    <label for="education">7. Highest Level of Education <span style="color: #999;">(max 10)</span></label>
                    <select id="education" data-max="10">
                        <option value="0">Select...</option>
                        <option value="10">PhD/Dr/Med/Vet (10 points)</option>
                        <option value="8">Master's degree (8 points)</option>
                        <option value="6">Bachelor's degree (6 points)</option>
                        <option value="5">College/University cert/Apprenticeship (5 points)</option>
                        <option value="0">Less than above (0 points)</option>
                    </select>
                    <div class="points-indicator" id="education-points"></div>
                </div>
                
                <!-- 8. Canadian Education Credentials -->
                <div class="form-group">
                    <label for="credentials">8. Canadian Education Credentials <span style="color: #999;">(max 10)</span></label>
                    <select id="credentials" data-max="10">
                        <option value="0">Select...</option>
                        <option value="10">More than one (10 points)</option>
                        <option value="5">One (5 points)</option>
                        <option value="0">None (0 points)</option>
                    </select>
                    <div class="points-indicator" id="credentials-points"></div>
                </div>
                
                <!-- 9. Language Ability -->
                <div class="form-group">
                    <label for="language">9. Official Language Ability (ENG or FRE) <span style="color: #999;">(max 15)</span></label>
                    <select id="language" data-max="15">
                        <option value="0">Select...</option>
                        <option value="15">CLB 9+ (15 points)</option>
                        <option value="12">CLB 8 (12 points)</option>
                        <option value="8">CLB 7 (8 points)</option>
                        <option value="4">CLB 6 (4 points)</option>
                        <option value="0">CLB 5 or lower (0 points)</option>
                    </select>
                    <div class="points-indicator" id="language-points"></div>
                </div>
                
                <!-- 10. Both Official Languages -->
                <div class="form-group">
                    <label for="bilingual">10. Knowledge of Both Official Languages <span style="color: #999;">(max 10)</span></label>
                    <select id="bilingual" data-max="10">
                        <option value="0">Select...</option>
                        <option value="10">Two languages (10 points)</option>
                        <option value="5">One language (5 points)</option>
                    </select>
                    <div class="points-indicator" id="bilingual-points"></div>
                </div>
                
                <!-- 11. Regional Immigration -->
                <div class="form-group">
                    <label for="region">11. Regional Immigration: Location of Employment <span style="color: #999;">(max 15)</span></label>
                    <select id="region" data-max="15">
                        <option value="0">Select...</option>
                        <option value="15">Northern Ontario (15 points)</option>
                        <option value="10">Eastern/Central outside GTA/Southwestern (10 points)</option>
                        <option value="5">Inside GTA except Toronto (5 points)</option>
                        <option value="0">Toronto (0 points)</option>
                    </select>
                    <div class="points-indicator" id="region-points"></div>
                </div>
            </div>
            
            <button type="button" class="reset-button" onclick="resetForm()">Reset All Selections</button>
        </form>
        
        <div class="status">
            <span>You have <span class="status-strong" id="remaining">130</span> points available.</span>
        </div>
        
        <div class="footer">
            <p>EOI scoring is used to evaluate candidates under the Ontario Workforce Priority Stream.</p>
            <p>Source: Ontario.ca / OINP Guidance</p>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('eoi-form');
        const selects = form.querySelectorAll('select[data-max]');
        
        function calculateScore() {
            let total = 0;
            
            selects.forEach(select => {
                const value = parseInt(select.value) || 0;
                total += value;
                
                const id = select.id;
                const pointsSpan = document.getElementById(id + '-points');
                const max = select.dataset.max;
                
                if (value > 0) {
                    pointsSpan.textContent = `${value}/${max} points`;
                    pointsSpan.style.color = '#667eea';
                } else {
                    pointsSpan.textContent = '';
                }
            });
            
            document.getElementById('totalScore').textContent = total;
            document.getElementById('remaining').textContent = (130 - total);
        }
        
        selects.forEach(select => {
            select.addEventListener('change', calculateScore);
        });
        
        function resetForm() {
            selects.forEach(select => {
                select.value = '0';
            });
            document.querySelectorAll('.points-indicator').forEach(span => {
                span.textContent = '';
            });
            calculateScore();
        }
        
        calculateScore();
    </script>
</body>
</html>
